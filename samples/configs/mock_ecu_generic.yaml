# ==========================================================================
#  CANmatik — Scriptable ECU Mock: Generic OBD-II
#
#  Simulates a basic passenger car ECU for ELM327 bridge testing.
#  All values are static snapshots; see comments for decoded meanings.
#
#  Request frames use ISO 15765-4 format:
#    id: 0x7DF (functional broadcast) or 0x7E0 (physical to ECU #0)
#    data[0] = PCI byte (0x02 = single frame, 2 payload bytes)
#    data[1] = OBD mode
#    data[2] = PID
#
#  Response frames use ECU response ID 0x7E8:
#    data[0] = PCI byte (0x04..0x06 = single frame, N payload bytes)
#    data[1] = mode + 0x40  (positive response)
#    data[2] = PID
#    data[3..] = value bytes
# ==========================================================================

name: "Generic OBD-II ECU"
description: "Simulates a typical passenger car with basic Mode 01 PIDs."

responses:
  # ------------------------------------------------------------------
  # Mode 01 — Current Data
  # ------------------------------------------------------------------

  # PID 00 — Supported PIDs [01-20]
  # Bitmap: BE 3E B8 13 → PIDs 01,03,04,05,06,07,0C,0D,0E,0F,10,11,13,15,1C,1F,20
  - request: { id: 0x7DF, data: [0x02, 0x01, 0x00] }
    response: { id: 0x7E8, data: [0x06, 0x41, 0x00, 0xBE, 0x3E, 0xB8, 0x13] }
  - request: { id: 0x7E0, data: [0x02, 0x01, 0x00] }
    response: { id: 0x7E8, data: [0x06, 0x41, 0x00, 0xBE, 0x3E, 0xB8, 0x13] }

  # PID 20 — Supported PIDs [21-40]
  # Bitmap: 80 01 A0 01 → PIDs 21,30,33,35,40
  - request: { id: 0x7DF, data: [0x02, 0x01, 0x20] }
    response: { id: 0x7E8, data: [0x06, 0x41, 0x20, 0x80, 0x01, 0xA0, 0x01] }
  - request: { id: 0x7E0, data: [0x02, 0x01, 0x20] }
    response: { id: 0x7E8, data: [0x06, 0x41, 0x20, 0x80, 0x01, 0xA0, 0x01] }

  # PID 40 — Supported PIDs [41-60]
  # Bitmap: 7E DC 00 00  → PIDs 42,43,44,45,46,47,49,4A,4C,4D,4E
  - request: { id: 0x7DF, data: [0x02, 0x01, 0x40] }
    response: { id: 0x7E8, data: [0x06, 0x41, 0x40, 0x7E, 0xDC, 0x00, 0x00] }
  - request: { id: 0x7E0, data: [0x02, 0x01, 0x40] }
    response: { id: 0x7E8, data: [0x06, 0x41, 0x40, 0x7E, 0xDC, 0x00, 0x00] }

  # PID 01 — Monitor status (MIL off, 0 DTCs, all monitors complete)
  - request: { id: 0x7DF, data: [0x02, 0x01, 0x01] }
    response: { id: 0x7E8, data: [0x06, 0x41, 0x01, 0x00, 0x07, 0xE5, 0xE5] }
  - request: { id: 0x7E0, data: [0x02, 0x01, 0x01] }
    response: { id: 0x7E8, data: [0x06, 0x41, 0x01, 0x00, 0x07, 0xE5, 0xE5] }

  # PID 03 — Fuel system status (closed loop)
  - request: { id: 0x7DF, data: [0x02, 0x01, 0x03] }
    response: { id: 0x7E8, data: [0x04, 0x41, 0x03, 0x02, 0x00] }

  # PID 04 — Calculated engine load: 35% → 0x59 (89/255 ≈ 35%)
  - request: { id: 0x7DF, data: [0x02, 0x01, 0x04] }
    response: { id: 0x7E8, data: [0x03, 0x41, 0x04, 0x59] }
  - request: { id: 0x7E0, data: [0x02, 0x01, 0x04] }
    response: { id: 0x7E8, data: [0x03, 0x41, 0x04, 0x59] }

  # PID 05 — Coolant temperature: 90°C → 0x82 (90+40=130)
  - request: { id: 0x7DF, data: [0x02, 0x01, 0x05] }
    response: { id: 0x7E8, data: [0x03, 0x41, 0x05, 0x82] }
  - request: { id: 0x7E0, data: [0x02, 0x01, 0x05] }
    response: { id: 0x7E8, data: [0x03, 0x41, 0x05, 0x82] }

  # PID 06 — Short term fuel trim: 0% → 0x80 (128)
  - request: { id: 0x7DF, data: [0x02, 0x01, 0x06] }
    response: { id: 0x7E8, data: [0x03, 0x41, 0x06, 0x80] }

  # PID 07 — Long term fuel trim: +3.1% → 0x84 (132)
  - request: { id: 0x7DF, data: [0x02, 0x01, 0x07] }
    response: { id: 0x7E8, data: [0x03, 0x41, 0x07, 0x84] }

  # PID 0C — Engine RPM: 2000 RPM → 0x1F40 (A=0x1F, B=0x40)
  - request: { id: 0x7DF, data: [0x02, 0x01, 0x0C] }
    response: { id: 0x7E8, data: [0x04, 0x41, 0x0C, 0x1F, 0x40] }
  - request: { id: 0x7E0, data: [0x02, 0x01, 0x0C] }
    response: { id: 0x7E8, data: [0x04, 0x41, 0x0C, 0x1F, 0x40] }

  # PID 0D — Vehicle speed: 60 km/h → 0x3C
  - request: { id: 0x7DF, data: [0x02, 0x01, 0x0D] }
    response: { id: 0x7E8, data: [0x03, 0x41, 0x0D, 0x3C] }
  - request: { id: 0x7E0, data: [0x02, 0x01, 0x0D] }
    response: { id: 0x7E8, data: [0x03, 0x41, 0x0D, 0x3C] }

  # PID 0E — Timing advance: 14° → 0x9C (14*2+128=156)
  - request: { id: 0x7DF, data: [0x02, 0x01, 0x0E] }
    response: { id: 0x7E8, data: [0x03, 0x41, 0x0E, 0x9C] }

  # PID 0F — Intake air temperature: 35°C → 0x4B (35+40=75)
  - request: { id: 0x7DF, data: [0x02, 0x01, 0x0F] }
    response: { id: 0x7E8, data: [0x03, 0x41, 0x0F, 0x4B] }

  # PID 10 — MAF air flow rate: 15.20 g/s → 0x05F0 (A=0x05, B=0xF0; 1520/100)
  - request: { id: 0x7DF, data: [0x02, 0x01, 0x10] }
    response: { id: 0x7E8, data: [0x04, 0x41, 0x10, 0x05, 0xF0] }

  # PID 11 — Throttle position: 22% → 0x38 (56/255 ≈ 22%)
  - request: { id: 0x7DF, data: [0x02, 0x01, 0x11] }
    response: { id: 0x7E8, data: [0x03, 0x41, 0x11, 0x38] }

  # PID 1C — OBD standard: ISO 15765-4 (CAN) → 0x06
  - request: { id: 0x7DF, data: [0x02, 0x01, 0x1C] }
    response: { id: 0x7E8, data: [0x03, 0x41, 0x1C, 0x06] }

  # PID 1F — Run time since engine start: 300s → 0x012C
  - request: { id: 0x7DF, data: [0x02, 0x01, 0x1F] }
    response: { id: 0x7E8, data: [0x04, 0x41, 0x1F, 0x01, 0x2C] }

  # PID 21 — Distance with MIL on: 0 km → 0x0000
  - request: { id: 0x7DF, data: [0x02, 0x01, 0x21] }
    response: { id: 0x7E8, data: [0x04, 0x41, 0x21, 0x00, 0x00] }

  # PID 2F — Fuel tank level: 65% → 0xA6 (166/255 ≈ 65%)
  - request: { id: 0x7DF, data: [0x02, 0x01, 0x2F] }
    response: { id: 0x7E8, data: [0x03, 0x41, 0x2F, 0xA6] }

  # PID 33 — Barometric pressure: 101 kPa → 0x65
  - request: { id: 0x7DF, data: [0x02, 0x01, 0x33] }
    response: { id: 0x7E8, data: [0x03, 0x41, 0x33, 0x65] }

  # PID 42 — Control module voltage: 14.2V → 0x3790 (14.2*1000=14200 → A=0x37,B=0x90 — actual: val/1000)
  - request: { id: 0x7DF, data: [0x02, 0x01, 0x42] }
    response: { id: 0x7E8, data: [0x04, 0x41, 0x42, 0x37, 0x88] }

  # ------------------------------------------------------------------
  # Mode 03 — Stored DTCs (none)
  # ------------------------------------------------------------------
  - request: { id: 0x7DF, data: [0x01, 0x03] }
    response: { id: 0x7E8, data: [0x02, 0x43, 0x00] }
  - request: { id: 0x7E0, data: [0x01, 0x03] }
    response: { id: 0x7E8, data: [0x02, 0x43, 0x00] }

  # ------------------------------------------------------------------
  # Mode 04 — Clear DTCs (positive response)
  # ------------------------------------------------------------------
  - request: { id: 0x7DF, data: [0x01, 0x04] }
    response: { id: 0x7E8, data: [0x01, 0x44] }
  - request: { id: 0x7E0, data: [0x01, 0x04] }
    response: { id: 0x7E8, data: [0x01, 0x44] }

  # ------------------------------------------------------------------
  # Mode 07 — Pending DTCs (none)
  # ------------------------------------------------------------------
  - request: { id: 0x7DF, data: [0x01, 0x07] }
    response: { id: 0x7E8, data: [0x02, 0x47, 0x00] }
  - request: { id: 0x7E0, data: [0x01, 0x07] }
    response: { id: 0x7E8, data: [0x02, 0x47, 0x00] }

  # ------------------------------------------------------------------
  # Mode 09 — Vehicle Information
  # ------------------------------------------------------------------

  # PID 00 — Supported Info PIDs: bitmap 54 40 00 00 → PIDs 02, 04, 06, 0A
  - request: { id: 0x7DF, data: [0x02, 0x09, 0x00] }
    response: { id: 0x7E8, data: [0x06, 0x49, 0x00, 0x54, 0x40, 0x00, 0x00] }

  # PID 02 — VIN: "WVWZZZ3CZWE123456" (multi-frame: FF + CF)
  - request: { id: 0x7DF, data: [0x02, 0x09, 0x02] }
    response:
      - { id: 0x7E8, data: [0x10, 0x14, 0x49, 0x02, 0x01, 0x57, 0x56, 0x57] }
      - { id: 0x7E8, data: [0x21, 0x5A, 0x5A, 0x5A, 0x33, 0x43, 0x5A, 0x57] }
      - { id: 0x7E8, data: [0x22, 0x45, 0x31, 0x32, 0x33, 0x34, 0x35, 0x36] }
  - request: { id: 0x7E0, data: [0x02, 0x09, 0x02] }
    response:
      - { id: 0x7E8, data: [0x10, 0x14, 0x49, 0x02, 0x01, 0x57, 0x56, 0x57] }
      - { id: 0x7E8, data: [0x21, 0x5A, 0x5A, 0x5A, 0x33, 0x43, 0x5A, 0x57] }
      - { id: 0x7E8, data: [0x22, 0x45, 0x31, 0x32, 0x33, 0x34, 0x35, 0x36] }

  # Flow control acknowledgment (sent by tester) — echo back CFs
  # The ScriptableMockChannel queues all response frames at once on the
  # initial request match, so the consecutive frames are already pending
  # when ObdSession reads them. The flow control write is simply absorbed.
  - request: { id: 0x7E0, data: [0x30, 0x00, 0x00] }
    response: []
